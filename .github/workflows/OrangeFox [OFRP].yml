name: OrangeFox [OFRP]

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://github.com/momo54181/sync.git'  # 修复URL格式
      # ... 其他输入参数保持不变 ...
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/byf3332/Xiaomi-Archimedes-device-tree.git'  # 补全设备树URL

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest  # 修复：使用支持的运行器
    permissions:
      contents: write
    
    # 可选：临时强制Node.js 24环境
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Check Out
        uses: actions/checkout@v4
        # 考虑升级到v6：uses: actions/checkout@v6
      
      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main
      
      - name: Initialize workspace
        run: |
          mkdir workspace
          cd workspace
          echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        id: pwd
      
      - name: Prepare the build environment
        run: |
          sudo apt update
          sudo apt install git aria2 -y
          git clone https://gitlab.com/OrangeFox/misc/scripts.git scripts
          cd scripts
          sudo bash setup/android_build_env.sh
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      
      # ... 其他步骤保持不变 ...
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        # 考虑升级到v3：uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
            ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
          name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
          tag_name: ${{ github.run_id }}
          body: |
            Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
            Device: ${{ github.event.inputs.DEVICE_NAME }}
            Target: ${{ github.event.inputs.BUILD_TARGET }}.img
            TREE: [Device Tree/Branch](${{ github.event.inputs.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
